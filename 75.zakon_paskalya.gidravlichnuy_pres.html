<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Самостійна робота: Тиск та Закон Паскаля</title>
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-color);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 { color: var(--primary-color); margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; font-size: 1.1em; }

        .variant-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 6px solid var(--primary-color);
            margin-bottom: 30px;
        }

        .variant-card h2 {
            color: var(--primary-color);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 0;
            text-align: center;
        }

        .task {
            margin-bottom: 25px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .task-title {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 1.1em;
        }

        .points {
            background: #fdf2e9;
            color: var(--accent-color);
            padding: 2px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: bold;
            border: 1px solid #fad7b5;
        }

        .task-content {
            text-align: justify;
            text-align-last: left;
            hyphens: auto;
        }

        .no-print {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            background: #27ae60;
            color: white;
            font-size: 1em;
            transition: background 0.2s;
        }

        button:hover {
            background: #219150;
        }

        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .variant-card { 
                box-shadow: none; 
                border: 1px solid #ccc; 
                page-break-after: always;
            }
        }
    </style
