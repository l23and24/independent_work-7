<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Самостійні роботи: 7 клас</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .lesson-card { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .lesson-card:hover { 
            transform: scale(1.05);
            z-index: 10;
        }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-800">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-extrabold mb-3 text-slate-900 tracking-tight">Самостійні роботи 7 клас</h1>
            <div class="h-1 w-24 bg-blue-600 mx-auto rounded-full mb-4"></div>
            <p class="text-slate-500 max-w-md mx-auto">Оберіть номер роботи для перегляду завдань. Кожна кнопка веде до відповідної папки з матеріалами.</p>
        </header>

        <!-- Сітка кнопок -->
        <div id="lesson-grid" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 gap-3 md:gap-4">
            <!-- Кнопки генеруються скриптом -->
        </div>

        <footer class="mt-16 pt-8 border-t border-slate-200 text-center text-slate-400 text-sm">
            <p>Усього робіт: 105 • Структура: папки від 1 до 105</p>
        </footer>
    </div>

    <script>
        /**
         * ЛОГІКА ГЕНЕРАЦІЇ:
         * Створюємо 105 кнопок.
         * Кожна кнопка веде на "номер/" - браузер сам знайде там index.html.
         */
        function generateGrid() {
            const grid = document.getElementById('lesson-grid');
            const totalLessons = 105;

            for (let i = 1; i <= totalLessons; i++) {
                const link = document.createElement('a');
                
                // Найбільш універсальний шлях для GitHub Pages: просто номер папки зі слешем
                link.href = i + "/"; 
                
                link.className = `
                    lesson-card 
                    flex items-center justify-center 
                    aspect-square rounded-xl 
                    bg-white border border-slate-200 
                    text-lg font-bold text-slate-700
                    shadow-sm hover:shadow-md hover:border-blue-500 hover:text-blue-600
                    bg-gradient-to-br hover:from-white hover:to-blue-50
                    cursor-pointer
                `;
                
                link.innerHTML = `<span>${i}</span>`;
                link.title = `Відкрити роботу №${i}`;
                
                grid.appendChild(link);
            }
        }

        window.onload = generateGrid;
    </script>
</body>
</html>
