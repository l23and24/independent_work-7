<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зміст репозиторію</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .file-card { transition: all 0.2s ease; }
        .file-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-800">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 text-center">
            <h1 id="repo-title" class="text-3xl font-bold mb-2 text-blue-900">Завантаження...</h1>
            <p id="repo-description" class="text-slate-500">Отримання списку файлів через GitHub API</p>
        </header>

        <!-- Індикатор завантаження -->
        <div id="loader" class="flex flex-col items-center justify-center my-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600 mb-4"></div>
            <p class="text-slate-400">Аналізуємо репозиторій...</p>
        </div>

        <!-- Повідомлення про помилку -->
        <div id="error-msg" class="hidden bg-red-50 border-l-4 border-red-500 p-6 mb-10 rounded-r-lg">
            <h3 class="font-bold text-red-800 text-lg mb-2">Щось пішло не так 🔍</h3>
            <p id="error-details" class="text-red-700"></p>
            <div class="mt-4 p-3 bg-red-100 rounded text-xs font-mono text-red-900" id="debug-info"></div>
            <p class="mt-4 text-sm text-slate-600">Порада: переконайтеся, що репозиторій <b>публічний</b> та перевірте налаштування MANUAL_USER/REPO в коді файлу.</p>
        </div>

        <!-- Список файлів -->
        <ul id="file-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></ul>

        <footer class="mt-20 pt-8 border-t border-slate-200 text-center text-slate-400 text-sm">
            <p>Generated via GitHub API Automation</p>
        </footer>
    </div>

    <script>
        /**
         * ЯКЩО АВТОМАТИКА НЕ ПРАЦЮЄ:
         * Впишіть свій нікнейм та назву репозиторію нижче між лапками.
         */
        const MANUAL_USER = ""; // Наприклад: "ivanov-dev"
        const MANUAL_REPO = ""; // Назва репозиторію: "study-project"

        async function init() {
            const list = document.getElementById('file-list');
            const loader = document.getElementById('loader');
            const title = document.getElementById('repo-title');
            const errorBox = document.getElementById('error-msg');
            const errorText = document.getElementById('error-details');
            const debugText = document.getElementById('debug-info');

            let user, repo;

            // Визначаємо користувача та репо
            if (MANUAL_USER && MANUAL_REPO) {
                user = MANUAL_USER;
                repo = MANUAL_REPO;
            } else {
                const hostParts = window.location.hostname.split('.');
                user = hostParts[0]; // На GitHub Pages це зазвичай нікнейм
                
                const pathParts = window.location.pathname.split('/').filter(p => p);
                repo = pathParts[0]; // Перша частина шляху - це назва репо
            }

            // Допоміжна інфа для розробника
            debugText.innerText = `Визначено: User=${user || '?'}, Repo=${repo || '?'}, URL=${window.location.href}`;

            if (!user || user === 'localhost' || !repo) {
                loader.style.display = 'none';
                errorBox.classList.remove('hidden');
                errorText.innerText = "Не вдалося автоматично визначити шлях до репозиторію. Це трапляється, якщо файл відкритий локально.";
                title.innerText = "Помилка конфігурації";
                return;
            }

            title.innerText = `Репозиторій: ${repo}`;
            const api = `https://api.github.com/repos/${user}/${repo}/contents/`;

            try {
                const response = await fetch(api);
                
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || "Доступ до API обмежений або репозиторій не знайдено.");
                }

                const data = await response.json();
                loader.style.display = 'none';

                // Сортування (папки спочатку, потім файли за назвою)
                data.sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name, undefined, {numeric: true});
                    return a.type === 'dir' ? -1 : 1;
                });

                const HIDDEN = ['index.html', 'README.md', 'LICENSE', 'favicon.ico'];

                data.forEach(item => {
                    if (HIDDEN.includes(item.name) || item.name.startsWith('.')) return;

                    const li = document.createElement('li');
                    li.className = 'file-card bg-white p-4 rounded-xl border border-slate-200 flex items-center gap-3';
                    
                    const isDir = item.type === 'dir';
                    const icon = isDir ? '📁' : '📄';
                    const url = isDir ? item.html_url : item.name;

                    li.innerHTML = `
                        <div class="text-2xl">${icon}</div>
                        <div class="flex-1 min-w-0">
                            <a href="${url}" class="block font-semibold text-blue-600 hover:underline truncate">
                                ${item.name}
                            </a>
                            <p class="text-[10px] text-slate-400 uppercase tracking-wider">${isDir ? 'Папка' : 'Документ'}</p>
                        </div>
                    `;
                    list.appendChild(li);
                });

                if (list.children.length === 0) {
                    list.innerHTML = '<li class="col-span-full text-center text-slate-400 py-10 italic">Файлів не знайдено</li>';
                }

            } catch (e) {
                loader.style.display = 'none';
                errorBox.classList.remove('hidden');
                errorText.innerText = e.message;
                title.innerText = "Помилка API";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
